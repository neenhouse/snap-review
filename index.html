      <style>
      .hero-og-banner {
        width: 100%;
        height: 40vh;
        min-height: 240px;
        max-height: 400px;
        overflow: hidden;
        position: relative;
      }
      .hero-og-banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }
      .hero-og-banner::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(transparent, var(--bg-primary, #0f0f13));
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="hero-og-banner"><img src="/hero-og.webp" alt="snap-review" loading="eager" /></div>
    <div id="root"></div>

  <script src="https://neenhouse.com/tech-panel.js" defer></script>
</body>
